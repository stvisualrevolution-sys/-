<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compliance Agent Console</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    input, button, textarea { width: 100%; padding: 10px; margin: 6px 0; }
    button { cursor: pointer; }
    pre { background: #111; color: #0f0; padding: 10px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>運送業コンプライアンスAI コンソール</h1>

  <div class="card">
    <h3>1) サインアップ</h3>
    <input id="suTenant" placeholder="会社名" />
    <input id="suEmail" placeholder="メール" />
    <input id="suPass" type="password" placeholder="パスワード" />
    <input id="suName" placeholder="表示名" />
    <button onclick="signup()">サインアップ</button>
  </div>

  <div class="card">
    <h3>2) ログイン</h3>
    <input id="liEmail" placeholder="メール" />
    <input id="liPass" type="password" placeholder="パスワード" />
    <button onclick="login()">ログイン</button>
    <p>Token保存先: ブラウザ localStorage</p>
  </div>

  <div class="card">
    <h3>3) CSV取込（manager/owner）</h3>
    <input id="csvFile" type="file" accept=".csv" />
    <button onclick="uploadCsv()">CSVを送信して解析</button>
  </div>

  <div class="card">
    <h3>4) 解析ログ表示</h3>
    <button onclick="loadAnalyses()">最新50件を取得</button>
  </div>

  <pre id="out">Ready.</pre>

<script>
const out = document.getElementById('out');
const api = '';

function setOut(v){ out.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2); }
function token(){ return localStorage.getItem('access_token') || ''; }

async function signup(){
  const body = {
    tenant_name: document.getElementById('suTenant').value,
    email: document.getElementById('suEmail').value,
    password: document.getElementById('suPass').value,
    display_name: document.getElementById('suName').value || null,
  };
  const r = await fetch(api + '/v1/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const j = await r.json();
  if (j.access_token) localStorage.setItem('access_token', j.access_token);
  setOut(j);
}

async function login(){
  const body = {
    email: document.getElementById('liEmail').value,
    password: document.getElementById('liPass').value,
  };
  const r = await fetch(api + '/v1/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const j = await r.json();
  if (j.access_token) localStorage.setItem('access_token', j.access_token);
  setOut(j);
}

async function uploadCsv(){
  const f = document.getElementById('csvFile').files[0];
  if (!f) return setOut('CSVファイルを選択してね');
  const fd = new FormData();
  fd.append('file', f);
  const r = await fetch(api + '/v1/ingest/csv', { method:'POST', headers:{'Authorization':'Bearer '+token()}, body: fd });
  const j = await r.json();
  setOut(j);
}

async function loadAnalyses(){
  const r = await fetch(api + '/v1/analyses', { headers:{'Authorization':'Bearer '+token()} });
  const j = await r.json();
  setOut(j);
}
</script>
</body>
</html>
