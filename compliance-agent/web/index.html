<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>コンプラAI かんたん画面</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 760px; margin: 20px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    h1 { margin: 0 0 8px; }
    h3 { margin: 0 0 8px; }
    input, button { width: 100%; padding: 10px; margin: 6px 0; font-size: 16px; }
    button { cursor: pointer; }
    .muted { color: #666; font-size: 13px; }
    pre { background: #111; color: #0f0; padding: 10px; border-radius: 8px; overflow: auto; min-height: 120px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <h1>運送業コンプラAI（かんたん）</h1>
  <p class="muted">難しいSwaggerは使わなくてOK。ここだけ触れば動きます。</p>

  <div class="card">
    <h3>① ログイン</h3>
    <input id="email" placeholder="メール（例: owner@example.com）" value="owner@example.com" />
    <input id="password" type="password" placeholder="パスワード" value="Pass1234!" />
    <button onclick="login()">ログインする</button>
    <div class="muted">ログイン成功後、下のCSV実行が使えます。</div>
  </div>

  <div class="card">
    <h3>② テンプレCSVを入手</h3>
    <a href="/sample/ingest-template.csv" download>テンプレCSVをダウンロード</a>
  </div>

  <div class="card">
    <h3>③ CSVで一括実行（判定 + 通知）</h3>
    <input id="csvFile" type="file" accept=".csv" />
    <div class="row">
      <button onclick="runBatch()">一括実行する</button>
      <button onclick="downloadErrorReport()">エラーCSVを出す</button>
    </div>
  </div>

  <div class="card">
    <h3>結果</h3>
    <pre id="out">Ready.</pre>
  </div>

<script>
const out = document.getElementById('out');
const api = '';

function setOut(v){ out.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2); }
function token(){ return localStorage.getItem('access_token') || ''; }

async function login(){
  const fd = new URLSearchParams();
  fd.set('username', document.getElementById('email').value);
  fd.set('password', document.getElementById('password').value);

  const r = await fetch(api + '/v1/auth/login', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: fd.toString()
  });
  const j = await r.json();
  if (j.access_token) {
    localStorage.setItem('access_token', j.access_token);
    setOut({ok:true, message:'ログイン成功', tenant_id:j.tenant_id, role:j.role});
  } else {
    setOut(j);
  }
}

async function runBatch(){
  const f = document.getElementById('csvFile').files[0];
  if (!f) return setOut('先にCSVファイルを選んでください');
  const fd = new FormData();
  fd.append('file', f);
  const r = await fetch(api + '/v1/ingest/csv-analyze-notify', {
    method:'POST',
    headers:{'Authorization':'Bearer '+token()},
    body: fd
  });
  const j = await r.json();
  setOut(j);
}

async function downloadErrorReport(){
  const f = document.getElementById('csvFile').files[0];
  if (!f) return setOut('先にCSVファイルを選んでください');
  const fd = new FormData();
  fd.append('file', f);
  const r = await fetch(api + '/v1/ingest/csv-errors-report', {
    method:'POST',
    headers:{'Authorization':'Bearer '+token()},
    body: fd
  });
  if (!r.ok){
    const t = await r.text();
    return setOut(t);
  }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ingest-errors.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setOut('エラーCSVをダウンロードしました。');
}
</script>
</body>
</html>
