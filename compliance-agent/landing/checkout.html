<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DriveCheck 購入</title>
<style>body{font-family:-apple-system,sans-serif;max-width:760px;margin:30px auto;padding:0 12px} .card{border:1px solid #ddd;border-radius:12px;padding:16px} input,button{width:100%;padding:10px;margin:8px 0} button{cursor:pointer}</style>
</head><body>
<h1>DriveCheck 購入</h1>
<div class="card">
  <p>価格: <strong>¥98,000（買い切り）</strong></p>
  <p>メールアドレスを入力して決済へ進みます。</p>
  <input id="email" placeholder="you@example.com" />
  <button onclick="checkout()">Stripeで購入する</button>
  <p id="msg"></p>
</div>
<script>
async function checkout(){
  const email=document.getElementById('email').value.trim();
  if(!email){document.getElementById('msg').textContent='メールを入力してください';return;}
  try{
    const r=await fetch('/v1/public/create-checkout',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email,
        success_url:location.origin + '/landing/success.html',
        cancel_url:location.origin + '/landing/checkout.html?canceled=1'
      })
    });
    const j=await r.json();
    if(j.checkout_url){ location.href=j.checkout_url; return; }
    document.getElementById('msg').textContent=JSON.stringify(j);
  }catch(e){document.getElementById('msg').textContent=String(e);}
}
</script>
</body></html>
